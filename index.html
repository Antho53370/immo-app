    function useLiveData() {
      const [data, setData]     = useState(null);

      useEffect(() => {
        fetch(DATA_URL + "?t=" + Date.now()) // Cache-busting
          .then(r => r.json())
          .then(d => { setData(d); setLoaded(true); })
          .catch(() => { setLoaded(true); }); // En cas d'erreur, on utilise les données par défaut
      }, []);

      return { data, loaded };
    }

          <label style={{ display:"block", fontSize:9, fontWeight:500, color:"#FFFFFF", marginBottom:4, textTransform:"uppercase", letterSpacing:"1.5px" }}>
            {label}{tooltip && <span title={tooltip} style={{ marginLeft:4, color:"#E8C050", fontSize:10, cursor:"help" }}>ⓘ</span>}
          </label>
          {sublabel && <div style={{ fontSize:10, color:"#FFFFFF", marginBottom:4, fontStyle:"italic", color:"#FFFFFF" }}>{sublabel}</div>}
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            {options ? (
              <select value={value} onChange={e=>onChange(e.target.value)} style={{ ...iS, color:"#FFFFFF" }}>
                {options.map(o=><option key={o.value} value={o.value} style={{ background:"#1A1A1A" }}>{o.label}</option>)}
              </select>
            ) : (
              <input type="text" inputMode="decimal" value={raw}
                onFocus={e=>{ if(raw==="0") setRaw(""); e.target.select(); }}
                onBlur={()=>{ const n=parseFloat(raw); if(isNaN(n)){setRaw("0");onChange(0);}else{setRaw(String(n));onChange(n);} }}
                onChange={e=>{ setRaw(e.target.value); const n=parseFloat(e.target.value); if(!isNaN(n)) onChange(n); }}
                style={{ ...iS }} />
            )}
            {suffix && <span style={{ fontSize:11, color:"#E8C050", whiteSpace:"nowrap", fontWeight:500 }}>{suffix}</span>}
          </div>
        </div>
      );
    }

    function Gauge({ value, max, label, color }) {
      const pct = Math.min(100, Math.max(0, (value/max)*100));
      return (
        <div style={{ marginBottom:10 }}>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, marginBottom:4 }}>
            <span style={{ color:"#FFFFFF", textTransform:"uppercase", letterSpacing:"1px" }}>{label}</span>
            <span style={{ fontWeight:600, color:"#E8C050" }}>{value.toFixed(2)}%</span>
          </div>
          <div style={{ height:3, background:"#1A1A1A", borderRadius:99, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${pct}%`, background:"linear-gradient(90deg,#E8C050,#E8C96A)", borderRadius:99 }}/>
          </div>
        </div>
      );
    }



    // ─── PAGE SIMULATEUR ──────────────────────────────────────────────────────
    function PageSimulateur({ onSauvegarder, onPDF }) {
      const fmt  = n => Math.round(n).toLocaleString("fr-FR");
      const fmtE = n => `${Math.round(n).toLocaleString("fr-FR")} €`;
      const fmtP = n => `${n.toFixed(2)}%`;

      // Chargement des données live
      const { data: liveData, loaded } = useLiveData();

      const [typeBien,setTypeBien]       = useState("appartement");

      const [fraisNot,setFraisNot]       = useState(8.0);
      const [agence,setAgence]           = useState(0);
      const [travaux,setTravaux]         = useState(0);

      // Taux par durée — mis à jour depuis data.json ou valeurs par défaut
      const TAUX_PAR_DUREE = {
        10: getLive(liveData, "taux_credit.immo_10ans", 3.20),
        15: getLive(liveData, "taux_credit.immo_15ans", 3.40),
        20: getLive(liveData, "taux_credit.immo_20ans", 3.65),
        25: getLive(liveData, "taux_credit.immo_25ans", 3.85),
      };

      // Fonction pour trouver le taux selon la durée (interpolation entre les paliers)
      const getTauxParDuree = (d) => {
        if (d <= 10) return TAUX_PAR_DUREE[10];
        if (d <= 15) return +(TAUX_PAR_DUREE[10] + (TAUX_PAR_DUREE[15] - TAUX_PAR_DUREE[10]) * (d - 10) / 5).toFixed(2);
        if (d <= 20) return +(TAUX_PAR_DUREE[15] + (TAUX_PAR_DUREE[20] - TAUX_PAR_DUREE[15]) * (d - 15) / 5).toFixed(2);
        return +(TAUX_PAR_DUREE[20] + (TAUX_PAR_DUREE[25] - TAUX_PAR_DUREE[20]) * Math.min(d - 20, 5) / 5).toFixed(2);
      };

      // Quand la durée change → taux se met à jour automatiquement
      const handleDureeChange = (d) => {
        setDuree(d);
        setTauxCredit(getTauxParDuree(d));
      };

      // Mise à jour des taux par défaut quand les données live arrivent
      useEffect(() => {
        if (liveData?.taux_credit) {
          setTauxCredit(getTauxParDuree(duree));
          setAssurCredit(liveData.taux_credit.assurance_emprunteur_moy);
        }
        if (liveData?.frais_notaire) {
          setFraisNot(liveData.frais_notaire.ancien_moy);
        }
      }, [liveData]);
      const [loyer,setLoyer]             = useState(800);
      const [vacance,setVacance]         = useState(0.5);
      const [regime,setRegime]           = useState("meuble_np");
      const [taxeFonc,setTaxeFonc]       = useState(1200);
      const [copro,setCopro]             = useState(1200);
      const [pno,setPno]                 = useState(200);
      const [gli,setGli]                 = useState(0);
      const [entretien,setEntretien]     = useState(500);
      const [gestionLoc,setGestionLoc]   = useState(0);
      const [cfe,setCfe]                 = useState(0);
      const [fraisPub,setFraisPub]       = useState(0);
      const [nbLots,setNbLots]           = useState(1);
      const [prixCpt,setPrixCpt]         = useState(250);
      const [autres,setAutres]           = useState(0);
      const [tmi,setTmi]                 = useState(30);
      const [revFoyer,setRevFoyer]       = useState(45000);
      const [region,setRegion]           = useState("province_moyenne");
      const [horizon,setHorizon]         = useState(10);
      const [regionManu,setRegionManu]   = useState(false);
      const [showLMNP,setShowLMNP]       = useState(false);
      const [nomBien,setNomBien]         = useState("");
      const [typeLog,setTypeLog]         = useState("t2");
      const [gamme,setGamme]             = useState("standard");
      const [budAmeubl,setBudAmeubl]     = useState(0);
      const [inclAmeubl,setInclAmeubl]   = useState(false);
      const [niveauReno,setNiveauReno]   = useState("");
      const [actifs,setActifs]           = useState({});
      const [montants,setMontants]       = useState({});
      const [tauxTrax,setTauxTrax]       = useState(5.5);
      const [dureeTrax,setDureeTrax]     = useState(10);
      const [tauxAmbl,setTauxAmbl]       = useState(6.0);
      const [dureeAmbl,setDureeAmbl]     = useState(5);
      const [zoneLoyer,setZoneLoyer]     = useState("province");
      const [showGrille,setShowGrille]   = useState(false);

      const VILLE_MAP = { paris:"paris_intra", grande_ville:"lyon", province:"province_moyenne", rural:"rural" };
      const VILLE_LOYER_MAP = { paris:"paris", grande_ville:"grande_ville", province:"province", rural:"rural" };
      const handleVille = v => { setVille(v); if(!regionManu) setRegion(VILLE_MAP[v]||"province_moyenne"); setZoneLoyer(VILLE_LOYER_MAP[v]||"province"); };
      const handleRegion = r => { setRegion(r); setRegionManu(true); };

      // Coefficient zone pour les travaux
      const coeffZone = COEFF_ZONE_TRAVAUX[zoneLoyer] || 1.0;
      const getMin = (p) => Math.round((p.u ? p.min * surface : p.min) * coeffZone);
      const getMax = (p) => Math.round((p.u ? p.max * surface : p.max) * coeffZone);
      const getMoy = (p) => Math.round((p.u ? p.moy * surface : p.moy) * coeffZone);

      const totalPostes = POSTES.reduce((acc,p)=>{ if(!actifs[p.id]) return acc; const def=getMoy(p); return acc+(montants[p.id]??def); },0);
      const totalGlobal = niveauReno&&niveauReno!=="rien" ? surface*((NIVEAUX[niveauReno].min+NIVEAUX[niveauReno].max)/2)*coeffZone : 0;
      const totalTrax   = Math.round(totalGlobal+totalPostes);

      const ameubl = AMBL[typeLog]||AMBL.t2;
      const gData  = ameubl[gamme]||ameubl.standard;
      const estMeuble = ["meuble_np","meuble_pro"].includes(regime);
      const amortAmbl = inclAmeubl&&budAmeubl>0 ? budAmeubl/7 : 0;
      const budAmblTot= inclAmeubl ? budAmeubl : 0;

      const fraisNotE  = prixAchat*(fraisNot/100);
      const invTotal   = prixAchat+fraisNotE+agence+travaux+budAmblTot;
      const baseImmo   = prixAchat+fraisNotE+agence;
      const emprunImmo = Math.max(0, baseImmo-apport);
      const apportR1   = Math.max(0, apport-baseImmo);
      const tMensImmo  = (tauxCredit+assurCredit)/100/12;
      const nMoisImmo  = duree*12;
      const mensImmo   = emprunImmo>0&&tMensImmo>0 ? emprunImmo*tMensImmo/(1-Math.pow(1+tMensImmo,-nMoisImmo)) : 0;
      const traxParApport  = Math.min(travaux,apportR1);
      const emprunTrax     = Math.max(0,travaux-traxParApport);
      const apportR2       = apportR1-traxParApport;
      const tMensTrax      = tauxTrax/100/12;
      const nMoisTrax      = dureeTrax*12;
      const mensTrax       = emprunTrax>0&&tMensTrax>0 ? emprunTrax*tMensTrax/(1-Math.pow(1+tMensTrax,-nMoisTrax)) : 0;
      const amblParApport  = Math.min(budAmblTot,apportR2);
      const emprunAmbl     = Math.max(0,budAmblTot-amblParApport);
      const tMensAmbl      = tauxAmbl/100/12;
      const nMoisAmbl      = dureeAmbl*12;
      const mensAmbl       = emprunAmbl>0&&tMensAmbl>0 ? emprunAmbl*tMensAmbl/(1-Math.pow(1+tMensAmbl,-nMoisAmbl)) : 0;
      const mensTot   = mensImmo+mensTrax+mensAmbl;
      const annuite   = mensTot*12;
      const loyerBrut = loyer*12;
      const loyerNet  = loyerBrut-loyer*vacance;
      const cpt       = nbLots*prixCpt;
      const charges   = taxeFonc+copro+pno+gli+entretien+cpt+gestionLoc+cfe+fraisPub+autres;
      const interets  = emprunImmo*tauxCredit/100 + emprunTrax*tauxTrax/100 + emprunAmbl*tauxAmbl/100;
      const cfBrut    = loyerNet-charges-annuite;

      let baseImp=0, impot=0, ps=0, noteFisc="";

      if(regime==="nu"){
        // ── LOCATION NUE — Revenus Fonciers ──────────────────────────────────
        // Régime réel : loyers - charges déductibles (taxe foncière, copro, PNO, GLI,
        // entretien, expert-comptable, intérêts d'emprunt). PAS d'amortissement.
        // Imposition : TMI + 17,2% prélèvements sociaux
        const chargesDeductiblesNu = taxeFonc + copro + pno + gli + entretien + cpt + gestionLoc + cfe + fraisPub + autres + interets;
        baseImp = Math.max(0, loyerNet - chargesDeductiblesNu);
        impot = baseImp * (tmi/100);
        ps    = baseImp * 0.172; // Prélèvements sociaux 17,2% sur revenus fonciers
        noteFisc = `Revenus fonciers imposés au TMI ${tmi}% + 17,2% PS. Charges déduites : ${fmt(chargesDeductiblesNu)} €/an. Pas d'amortissement possible.`;

      } else if(regime==="meuble_np"){
        // ── LMNP RÉGIME RÉEL — BIC ───────────────────────────────────────────
        // Amortissement : bien hors terrain (~85% du prix) sur 30–40 ans = ~2,5–3%
        // Terrain non amortissable (~15% du prix)
        // Travaux amortis sur 10 ans (10%/an)
        // Mobilier amorti sur 5–7 ans (~15%/an)
        // Si base imposable = 0 → AUCUN impôt ni PS (c'est le gros avantage du LMNP réel)
        // Charges déductibles : TOUTES les charges + intérêts + amortissements
        const valeurAmortissable = prixAchat * 0.85; // Hors terrain (15% non amortissable)
        const amortBien    = valeurAmortissable * 0.03;  // ~3%/an sur 33 ans
        const amortTravaux = travaux * 0.10;             // 10%/an sur 10 ans
        const amortMobilier= amortAmbl;                  // 1/7e par an (saisi par user)
        const amortTotal   = amortBien + amortTravaux + amortMobilier;
        const chargesDeductiblesLMNP = charges + interets + amortTotal;
        baseImp = Math.max(0, loyerNet - chargesDeductiblesLMNP);
        // En BIC réel : si base = 0, impôt = 0 et PAS de PS
        // Si base > 0 : TMI + 17,2% PS (comme BNC)
        impot = baseImp * (tmi/100);
        ps    = baseImp * 0.172;
        const economieGrace = amortTotal > 0 && baseImp === 0 ? "✅ Résultat fiscal nul grâce aux amortissements — aucun impôt ni PS !" : "";
        noteFisc = `BIC réel. Amortissement bien : ${fmt(amortBien)} €/an + travaux : ${fmt(amortTravaux)} €/an + mobilier : ${fmt(amortMobilier)} €/an = ${fmt(amortTotal)} €/an total. ${economieGrace}`;

      } else if(regime==="meuble_pro"){
        // ── LMP — BIC PROFESSIONNEL ──────────────────────────────────────────
        // Mêmes règles d'amortissement que LMNP mais :
        // - Déficits imputables sur le revenu global (sans limite)
        // - Cotisations SSI obligatoires (~35% des bénéfices) à la place des PS
        // - Exonération plus-value après 5 ans si recettes < 90 000€
        const valeurAmortissable2 = prixAchat * 0.85;
        const amortBien2     = valeurAmortissable2 * 0.03;
        const amortTravaux2  = travaux * 0.10;
        const amortMobilier2 = amortAmbl;
        const amortTotal2    = amortBien2 + amortTravaux2 + amortMobilier2;
        const chargesDeductiblesLMP = charges + interets + amortTotal2;
        baseImp = Math.max(0, loyerNet - chargesDeductiblesLMP);
        impot = baseImp * (tmi/100);
        // SSI au lieu de PS (~35% des bénéfices nets, mais min ~1 200€/an si activité)
        ps = baseImp * 0.35; // Cotisations SSI estimées à 35% (TNS régime général)
        noteFisc = `BIC pro. Amortissements : ${fmt(amortTotal2)} €/an. Cotisations SSI ~35% des bénéfices. Déficits imputables sur revenu global.`;

      } else {
        // ── SCI À L'IS ───────────────────────────────────────────────────────
        // IS calculé sur : loyers - charges - INTÉRÊTS SEULEMENT (pas le capital)
        // - pas les mensualités entières, seulement la part intérêts
        // Amortissement du bien possible à l'IS aussi (~3%/an hors terrain)
        const valeurAmortissableIS = prixAchat * 0.85;
        const amortIS = valeurAmortissableIS * 0.03 + travaux * 0.10;
        const beneficeIS = Math.max(0, loyerNet - charges - interets - amortIS);
        // IS progressif : 15% jusqu'à 42 500€, 25% au-delà
        const is1 = Math.min(beneficeIS, 42500) * 0.15;
        const is2 = Math.max(0, beneficeIS - 42500) * 0.25;
        impot = is1 + is2;
        baseImp = beneficeIS;
        ps = 0; // Pas de PS à l'IS (mais flat tax 30% sur dividendes si distribution)
        noteFisc = `IS sur bénéfice net après amortissements (${fmt(amortIS)} €/an) et intérêts. 15% <42 500€, 25% au-delà. Attention : dividendes soumis à flat tax 30% si distribution.`;
      }
      const cfNet = cfBrut-impot-ps;
      const rBrute= invTotal>0?(loyerBrut/invTotal)*100:0;
      const rNette= invTotal>0?((loyerNet-charges)/invTotal)*100:0;
      const rNN   = invTotal>0?((loyerNet-charges-impot-ps)/invTotal)*100:0;
      const rCap  = apport>0?(cfNet/apport)*100:0;

      // ── Valorisation (doit être avant TRI) ───────────────────────────────────
      const zd      = ZONES[region];
      const tauxV   = zd.taux*(COEFF[typeBien]||1)/100;
      const valBase = prixAchat+travaux+budAmblTot;
      const valFut  = valBase*Math.pow(1+tauxV,horizon);
      const pxRev   = invTotal;
      const pvBrute = valFut-pxRev;
      const abIR    = horizon<6?0:horizon>=22?1:(horizon-5)*0.06;
      const abPS    = horizon<6?0:horizon>=30?1:horizon<22?(horizon-5)*0.0165:0.28+(horizon-22)*0.09;
      const impotPV = Math.max(0,pvBrute)*(1-abIR)*0.19+Math.max(0,pvBrute)*(1-abPS)*0.172;
      const pvNette = pvBrute-impotPV;
      const cashRevente = valFut-impotPV;

      // ── TRI (Taux de Rendement Interne) ──────────────────────────────────────
      // Le TRI mesure le rendement RÉEL de l'apport investi
      // Flux 0  = -apport (mise de départ)
      // Flux 1→N-1 = cfNet annuel (loyers - charges - mensualités - impôts)
      // Flux N  = cfNet + cashNet de revente (prix vente - capital restant dû - impôt PV)
      const calcTRI = (n) => {
        if(apport <= 0) return null;

        // Capital restant dû sur le crédit immo après n années
        const tauxM = (tauxCredit+assurCredit)/100/12;
        const nMoisTotal = duree*12;
        const nMoisEcoules = Math.min(n*12, nMoisTotal);
        // Formule capital restant dû
        const capitalDu = nMoisEcoules >= nMoisTotal ? 0
          : emprunImmo * (Math.pow(1+tauxM, nMoisTotal) - Math.pow(1+tauxM, nMoisEcoules))
            / (Math.pow(1+tauxM, nMoisTotal) - 1);

        // Valeur du bien dans n années (pas horizon global, mais n années)
        const valBienN = valBase * Math.pow(1+tauxV, n);
        // Plus-value et impôt sur n années
        const pvBruteN = Math.max(0, valBienN - pxRev);
        const abIRn    = n<6?0:n>=22?1:(n-5)*0.06;
        const abPSn    = n<6?0:n>=30?1:n<22?(n-5)*0.0165:0.28+(n-22)*0.09;
        const impotPVn = pvBruteN*(1-abIRn)*0.19 + pvBruteN*(1-abPSn)*0.172;
        // Cash net à la revente = prix vente - capital restant dû - impôt PV
        const cashNetRevente = valBienN - capitalDu - impotPVn;

        const van = (r) => {
          if(r <= -1) return Infinity;
          let v = -apport;
          for(let t=1; t<=n; t++) {
            const flux = t===n ? cfNet + cashNetRevente : cfNet;
            v += flux / Math.pow(1+r, t);
          }
          return v;
        };

        // Bisection entre -99% et +99%
        let lo = -0.99, hi = 0.99;
        const vLo = van(lo), vHi = van(hi);
        if((vLo > 0 && vHi > 0) || (vLo < 0 && vHi < 0)) return null;

        for(let i=0; i<100; i++) {
          const mid = (lo+hi)/2;
          if(Math.abs(hi-lo) < 0.000001) {
            const res = Math.round(mid*1000)/10;
            return (res > -99 && res < 99) ? res : null;
          }
          if(van(mid)*van(lo) <= 0) hi = mid;
          else lo = mid;
        }
        const res = Math.round(((lo+hi)/2)*1000)/10;
        return (res > -99 && res < 99) ? res : null;
      };

      const tri10 = calcTRI(10);
      const tri20 = calcTRI(20);

      // ── COMPARAISON DES 4 RÉGIMES ─────────────────────────────────────────────
      const calcRegime = (r) => {
        let imp=0, pss=0;
        const interetsR = interets;
        if(r==="nu"){
          const base = Math.max(0, loyerNet - taxeFonc - copro - pno - gli - entretien - cpt - gestionLoc - cfe - fraisPub - autres - interetsR);
          imp = base*(tmi/100); pss = base*0.172;
        } else if(r==="meuble_np"){
          const amort = prixAchat*0.85*0.03 + travaux*0.10 + amortAmbl;
          const base  = Math.max(0, loyerNet - charges - interetsR - amort);
          imp = base*(tmi/100); pss = base*0.172;
        } else if(r==="meuble_pro"){
          const amort = prixAchat*0.85*0.03 + travaux*0.10 + amortAmbl;
          const base  = Math.max(0, loyerNet - charges - interetsR - amort);
          imp = base*(tmi/100); pss = base*0.35;
        } else {
          const amort  = prixAchat*0.85*0.03 + travaux*0.10;
          const benef  = Math.max(0, loyerNet - charges - interetsR - amort);
          imp = Math.min(benef,42500)*0.15 + Math.max(0,benef-42500)*0.25;
        }
        const cf = cfBrut - imp - pss;
        const rn = invTotal>0?((loyerNet-charges)/invTotal)*100:0;
        const rnn= invTotal>0?((loyerNet-charges-imp-pss)/invTotal)*100:0;
        return { regime:r, label:REGIME_INFO[r].label, cfMensuel:cf/12, rNette:rn, rNN:rnn, impotAnnuel:imp+pss };
      };
      const comparRegimes = ["nu","meuble_np","meuble_pro","sci_is"].map(calcRegime);
      const bestRegime = comparRegimes.reduce((a,b) => b.rNN > a.rNN ? b : a);

      // ── PROJECTION 20 ANS ─────────────────────────────────────────────────────
      const IRL = 0.02;       // Revalorisation loyers ~2%/an (IRL moyen)
      const INFLATION = 0.015; // Inflation charges ~1,5%/an
      const projection20 = Array.from({length:21}, (_,an) => {
        if(an===0) return { an, loyer:loyerNet, charges, cfNet, patrimoine:0, capitalRembourse:0 };
        const loyerAn   = loyerNet * Math.pow(1+IRL, an);
        const chargesAn = charges  * Math.pow(1+INFLATION, an);
        const tauxM     = (tauxCredit+assurCredit)/100/12;
        const nMoisT    = duree*12;
        const nMoisE    = Math.min(an*12, nMoisT);
        const capitalDuAn = nMoisE >= nMoisT ? 0
          : emprunImmo*(Math.pow(1+tauxM,nMoisT)-Math.pow(1+tauxM,nMoisE))/(Math.pow(1+tauxM,nMoisT)-1);
        const capRembourse = emprunImmo - capitalDuAn;
        // Impôt simplifié (on garde le même régime)
        const cfBrutAn  = loyerAn - chargesAn - annuite;
        const cfNetAn   = cfBrutAn - (impot+ps) * Math.pow(1+INFLATION, an);
        // Valeur bien à l'année n
        const valBienAn = valBase * Math.pow(1+tauxV, an);
        // Patrimoine net = valeur bien - capital restant dû
        const patrimoineAn = valBienAn - capitalDuAn;
        return { an, loyer:loyerAn, charges:chargesAn, cfNet:cfNetAn, patrimoine:patrimoineAn, capitalRembourse:capRembourse, valBien:valBienAn };
      }).slice(1); // Enlève l'année 0

                  ✅ Reporter dans le budget travaux
                </button>
              </div>
            </Sec>

            {/* AMEUBLEMENT */}
            <Sec title={estMeuble?"Ameublement (obligatoire LMNP/LMP)":"Ameublement (optionnel)"} icon="🛋️" color={estMeuble?"#40916C":"#888888"}>

                <div style={{ fontSize:11,fontWeight:700,color:"#E8C050",marginBottom:7 }}>Répartition</div>
                {[["Bien + frais + agence",fmtE(baseImmo),"#BBBBBB"],["Apport sur le bien",fmtE(Math.min(apport,baseImmo)),"#40916C"],["→ Crédit immobilier",fmtE(emprunImmo),emprunImmo>0?"#C0392B":"#40916C"],
                  ...(travaux>0?[["→ Prêt travaux",fmtE(emprunTrax),emprunTrax>0?"#f59e0b":"#40916C"]]:
                  []),
                  ...(budAmblTot>0?[["→ Crédit conso",fmtE(emprunAmbl),emprunAmbl>0?"#A07830":"#40916C"]]:
                  []),
                ].map(([k,v,c])=>(
                  <div key={k} style={{ display:"flex",justifyContent:"space-between",fontSize:10,padding:"3px 0",borderBottom:"1px solid #1A1A1A" }}>
                    <span style={{ color:"#FFFFFF" }}>{k}</span><span style={{ fontWeight:700,color:c }}>{v}</span>
                  </div>
                ))}
              </div>

              <div style={{ background:"#0A1A14",border:"2px solid #99f6e4",borderRadius:11,padding:"11px 13px",marginBottom:11 }}>
                <div style={{ fontSize:12,fontWeight:800,color:"#E8C050",marginBottom:7 }}>🏦 Crédit immobilier</div>
                <div style={{ background:"#e0f2fe",borderRadius:7,padding:"6px 9px",fontSize:10,color:"#0369a1",marginBottom:9 }}>ℹ️ Taux le plus bas — bien = garantie. Durée 15–25 ans.</div>
                <F label="Taux (hors assurance)" value={tauxCredit} onChange={setTauxCredit} suffix="%" step={0.05} sublabel="Ajusté automatiquement selon la durée — modifiable manuellement" />
                <F label="Assurance emprunteur" value={assurCredit} onChange={setAssurCredit} suffix="%" step={0.05} sublabel="0,2–0,4% selon profil" />
                <F label="Durée" value={duree} onChange={handleDureeChange} suffix="ans" step={1} />
                {/* Grille des taux par durée */}
                <div style={{ background:"#e0f2fe", borderRadius:8, padding:"8px 10px", fontSize:10, color:"#0369a1", marginBottom:8 }}>
                  <div style={{ fontWeight:700, marginBottom:4 }}>📊 Taux du marché selon la durée (avril 2025)</div>
                  <div style={{ display:"flex", gap:6 }}>
                    {[[10,"3,20%"],[15,"3,40%"],[20,"3,65%"],[25,"3,85%"]].map(([d,t])=>(
                      <div key={d} style={{ flex:1, textAlign:"center", background: duree===d ? "#0369a1" : "rgba(255,255,255,0.6)", borderRadius:6, padding:"3px 4px", cursor:"pointer" }}
                        onClick={()=>handleDureeChange(d)}>
                        <div style={{ fontSize:9, color: duree===d ? "#fff" : "#0369a1", fontWeight:600 }}>{d} ans</div>
                        <div style={{ fontSize:11, fontWeight:800, color: duree===d ? "#fff" : "#0c4a6e" }}>{t}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ marginTop:4, fontSize:9, opacity:0.8 }}>Tapez sur une durée pour l'appliquer automatiquement</div>
                </div>
                <div style={{ display:"flex",justifyContent:"space-between",fontSize:11,padding:"5px 0" }}>
                  <span style={{ color:"#FFFFFF" }}>Mensualité crédit immo</span>
                  <span style={{ fontWeight:800,color:"#E8C050" }}>{fmtE(mensImmo)} / mois</span>
                </div>
              </div>

              {travaux>0&&(
                <div style={{ background:"#0F0D00",border:"2px solid #fde68a",borderRadius:11,padding:"11px 13px",marginBottom:11 }}>
                  <div style={{ fontSize:12,fontWeight:800,color:"#E8C050",marginBottom:7 }}>🔧 Prêt travaux</div>
                  <div style={{ background:"#fef3c7",borderRadius:7,padding:"6px 9px",fontSize:10,color:"#E8C050",marginBottom:9 }}>ℹ️ Taux plus élevé (5–8%), durée 7–10 ans max.</div>
                  {emprunTrax>0?(<>
                    <F label="Taux" value={tauxTrax} onChange={setTauxTrax} suffix="%" step={0.1} sublabel="5–8% selon organisme" />
                    <F label="Durée" value={dureeTrax} onChange={setDureeTrax} suffix="ans" step={1} sublabel="7–10 ans max" />
                    <div style={{ display:"flex",justifyContent:"space-between",fontSize:11,padding:"5px 0" }}>
                      <span style={{ color:"#FFFFFF" }}>Mensualité travaux</span><span style={{ fontWeight:800,color:"#E8C050" }}>{fmtE(mensTrax)} / mois</span>
                    </div>
                  </>):(<div style={{ fontSize:10,color:"#40916C",fontWeight:600 }}>✅ Travaux couverts par votre apport</div>)}
                </div>
              )}

              {budAmblTot>0&&(
                <div style={{ background:"#0F0A1A",border:"2px solid #ddd6fe",borderRadius:11,padding:"11px 13px",marginBottom:11 }}>
                  <div style={{ fontSize:12,fontWeight:800,color:"#A07830",marginBottom:7 }}>🛋️ Crédit conso (ameublement)</div>
                  <div style={{ background:"#ede9fe",borderRadius:7,padding:"6px 9px",fontSize:10,color:"#5b21b6",marginBottom:9 }}>ℹ️ Ne peut pas être dans le crédit immo. Durée 3–5 ans.</div>
                  {emprunAmbl>0?(<>
                    <F label="Taux" value={tauxAmbl} onChange={setTauxAmbl} suffix="%" step={0.1} sublabel="4–8%" />
                    <F label="Durée" value={dureeAmbl} onChange={setDureeAmbl} suffix="ans" step={1} sublabel="3–5 ans" />
                    <div style={{ display:"flex",justifyContent:"space-between",fontSize:11,padding:"5px 0" }}>
                      <span style={{ color:"#FFFFFF" }}>Mensualité conso</span><span style={{ fontWeight:800,color:"#A07830" }}>{fmtE(mensAmbl)} / mois</span>
                    </div>
                  </>):(<div style={{ fontSize:10,color:"#40916C",fontWeight:600 }}>✅ Ameublement couvert par votre apport</div>)}
                </div>
              )}

              <div style={{ background:"#0F0D00",borderRadius:11,padding:"11px 13px",color:"#fff" }}>
                <div style={{ fontSize:11,fontWeight:700,opacity:0.85 }}>TOTAL mensualités toutes dettes</div>
                <div style={{ fontSize:24,fontWeight:900,margin:"3px 0" }}>{fmtE(mensTot)} / mois</div>
                <div style={{ fontSize:10,opacity:0.7 }}>Immo : {fmtE(mensImmo)}{mensTrax>0?` + Travaux : ${fmtE(mensTrax)}`:""}{mensAmbl>0?` + Meuble : ${fmtE(mensAmbl)}`:""}</div>
              </div>
            </Sec>

            {/* REVENUS */}
            <Sec title="Revenus locatifs" icon="💶" color="#E8C050">
              <div style={{ marginBottom:14 }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7 }}>
                  <div style={{ fontSize:12,fontWeight:700,color:"#FFFFFF" }}>📊 Prix du m² locatif par zone</div>
                  <button onClick={e=>{e.stopPropagation();setShowGrille(v=>!v);}} style={{ background:"#E8C050",border:"none",borderRadius:7,padding:"3px 9px",color:"#fff",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit" }}>
                    {showGrille?"Masquer":"Voir grille"}
                  </button>
                </div>
                <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:9 }}>
                  {Object.entries(PRIX_M2_LOCATIF).map(([k,z])=>(
                    <button key={k} onClick={()=>setZoneLoyer(k)} style={{ background:zoneLoyer===k?z.color:"#111111",border:`2px solid ${zoneLoyer===k?z.color:"#2C2C2C"}`,borderRadius:9,padding:"6px 7px",cursor:"pointer",fontFamily:"inherit",textAlign:"left" }}>
                      <div style={{ fontSize:9,fontWeight:700,color:zoneLoyer===k?"#fff":"#BBBBBB",lineHeight:1.3 }}>{z.label}</div>
                      <div style={{ fontSize:10,fontWeight:900,color:zoneLoyer===k?"rgba(255,255,255,0.9)":z.color,marginTop:1 }}>{z.min}–{z.max} €/m²</div>
                    </button>
                  ))}
                </div>

                {(()=>{
                  const z=PRIX_M2_LOCATIF[zoneLoyer];
                  const lBas=Math.round(z.min*surface), lHaut=Math.round(z.max*surface), lMoy=Math.round(z.moy*surface);
                  return (
                    <div style={{ background:z.color,borderRadius:11,padding:"11px 13px",color:"#fff",marginBottom:9 }}>
                      <div style={{ fontSize:11,fontWeight:800,marginBottom:2 }}>{z.label}</div>
                      <div style={{ fontSize:10,opacity:0.9,marginBottom:9 }}>{z.info}</div>
                      <div style={{ display:"flex",gap:7,marginBottom:9 }}>
                        {[[`${z.min} €/m²`,"Bas du marché"],[`${z.moy} €/m²`,"Moyenne"],[`${z.max} €/m²`,"Haut du marché"]].map(([val,lbl],i)=>(
                          <div key={lbl} style={{ flex:1,background:i===1?"rgba(255,255,255,0.3)":"rgba(255,255,255,0.15)",borderRadius:7,padding:"5px 6px",textAlign:"center",border:i===1?"2px solid rgba(255,255,255,0.5)":"none" }}>
                            <div style={{ fontSize:8,opacity:0.8,textTransform:"uppercase",marginBottom:1 }}>{lbl}</div>
                            <div style={{ fontSize:13,fontWeight:900 }}>{val}</div>
                          </div>
                        ))}
                      </div>
                      <div style={{ background:"rgba(255,255,255,0.2)",borderRadius:9,padding:"9px 11px" }}>
                        <div style={{ fontSize:10,opacity:0.9,marginBottom:5 }}>💡 Pour <strong>{surface} m²</strong> | Meublé : {z.meuble}</div>
                        <div style={{ display:"flex",gap:7 }}>
                          {[["Bas",lBas],["Moyen",lMoy],["Haut",lHaut]].map(([lbl,val])=>(
                            <div key={lbl} style={{ flex:1,textAlign:"center" }}>
                              <div style={{ fontSize:8,opacity:0.8,textTransform:"uppercase" }}>{lbl}</div>
                              <div style={{ fontSize:13,fontWeight:800 }}>{val.toLocaleString("fr-FR")} €</div>
                              <button onClick={()=>setLoyer(val)} style={{ marginTop:3,background:"rgba(255,255,255,0.3)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:5,padding:"2px 5px",color:"#fff",fontSize:9,fontWeight:700,cursor:"pointer",fontFamily:"inherit",width:"100%" }}>Utiliser</button>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  );
                })()}

                {showGrille&&(
                  <div style={{ background:"#111",border:"1px solid #2C2C2C",borderRadius:11,padding:"11px 13px",marginBottom:9 }}>
                    <div style={{ fontSize:11,fontWeight:700,color:"#FFFFFF",marginBottom:5 }}>Grille complète France 2025</div>
                    {Object.values(PRIX_M2_LOCATIF).map(z=>(
                      <div key={z.label} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #1A1A1A" }}>
                        <span style={{ fontSize:10,color:"#FFFFFF",flex:1 }}>{z.label}</span>
                        <div style={{ display:"flex",gap:4,flexShrink:0 }}>
                          <span style={{ background:"#0F0D00",borderRadius:4,padding:"1px 6px",fontSize:9,fontWeight:700,color:"#E8C050" }}>{z.min}</span>
                          <span style={{ background:"#0A1A0F",borderRadius:4,padding:"1px 6px",fontSize:9,fontWeight:700,color:"#40916C" }}>{z.moy}</span>
                          <span style={{ background:"#1A0000",borderRadius:4,padding:"1px 6px",fontSize:9,fontWeight:700,color:"#C0392B" }}>{z.max} €/m²</span>
                        </div>
                      </div>
                    ))}
                    <div style={{ marginTop:7,fontSize:9,color:"#EEEEEE" }}>⚠️ Prix indicatifs. Paris soumise à l'encadrement des loyers.</div>
                  </div>
                )}
              </div>

              <F label="Loyer mensuel total perçu" value={loyer} onChange={setLoyer} suffix="€" step={10}
                sublabel="Saisissez le loyer d'UN logement, ou le TOTAL de tous les loyers si vous achetez un immeuble de plusieurs appartements (ex. 4 apparts à 600€ = 2 400€)"
                tooltip="Pour un immeuble de rapport : additionnez tous les loyers mensuels de l'ensemble des logements" />
              <F label="Vacance locative" value={vacance} onChange={setVacance} suffix="mois/an" step={0.5} sublabel="Paris 0,5 | Province 1 | Rural 1,5–2 mois" />
              <div style={{ background:"#0F0D00",borderRadius:9,padding:"7px 11px",fontSize:11,color:"#E8C050" }}>
                Brut : <strong>{fmtE(loyerBrut)}</strong> | Après {vacance} mois vacance : <strong>{fmtE(loyerNet)}</strong>
              </div>
            </Sec>

            {/* CHARGES */}
            <Sec title="Charges annuelles" icon="📊" color="#E8C050">
              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:7 }}>
                <F label="Taxe foncière" value={taxeFonc} onChange={setTaxeFonc} suffix="€" sublabel="~1–2 mois de loyer" />
                <F label="Charges copro" value={copro} onChange={setCopro} suffix="€" sublabel="Part non récupérable" />
                <F label="Assurance PNO" value={pno} onChange={setPno} suffix="€" sublabel="Propriétaire Non Occupant" />
                <F label="Assur. loyers impayés" value={gli} onChange={setGli} suffix="€" sublabel="GLI : ~3–4% des loyers" />
                <F label="Entretien / provision" value={entretien} onChange={setEntretien} suffix="€" sublabel="Réparations courantes" />
                <F label="Frais de publicité" value={fraisPub} onChange={setFraisPub} suffix="€" sublabel="Annonces SeLoger, PAP… ~100–300€/an" tooltip="Déductible au réel — coût des annonces de location" />
              </div>

              {/* Gestion locative */}
              <div style={{ background:"#0A0A0A",border:"1px solid #2C2C2C",borderLeft:`2px solid ${OR}`,borderRadius:7,padding:"10px 12px",marginBottom:10 }}>
                <div style={{ fontSize:9,textTransform:"uppercase",letterSpacing:"1.5px",color:OR,marginBottom:6 }}>Gestion locative (agence)</div>
                <div style={{ fontSize:10,color:"#FFFFFF",marginBottom:8 }}>Si vous confiez la gestion à une agence. Saisissez le montant annuel ou calculez depuis le % des loyers.</div>
                <div style={{ display:"flex",gap:8,alignItems:"flex-end" }}>
                  <div style={{ flex:1 }}><F label="Montant annuel" value={gestionLoc} onChange={setGestionLoc} suffix="€" sublabel="~6–10% des loyers perçus" tooltip="Honoraires agence : recherche locataire, état des lieux, gestion courante" /></div>
                  <button onClick={()=>setGestionLoc(Math.round(loyerNet*0.08))}
                    style={{ background:"#1A1A1A",border:`1px solid ${N5}`,borderRadius:6,padding:"6px 10px",color:OR,fontSize:9,fontWeight:600,letterSpacing:"1px",textTransform:"uppercase",cursor:"pointer",fontFamily:"inherit",marginBottom:12,whiteSpace:"nowrap" }}>
                    8% auto
                  </button>
                </div>
              </div>

              {/* CFE */}
              <div style={{ background:"#0A0A0A",border:"1px solid #2C2C2C",borderLeft:`2px solid ${OR}`,borderRadius:7,padding:"10px 12px",marginBottom:10 }}>
                <div style={{ fontSize:9,textTransform:"uppercase",letterSpacing:"1.5px",color:OR,marginBottom:4 }}>CFE — Cotisation Foncière des Entreprises</div>
                <div style={{ fontSize:10,color:"#FFFFFF",marginBottom:8 }}>Obligatoire en LMNP et LMP. Varie selon la commune : ~100–500€/an. Exonération la 1ère année d'activité.</div>
                <F label="Montant CFE annuel" value={cfe} onChange={setCfe} suffix="€" sublabel="0€ si location nue ou SCI IS · ~200€/an en moyenne LMNP" tooltip="Impôt local obligatoire pour tout loueur en meublé (LMNP/LMP). Déductible du résultat." />
              </div>
              <div style={{ background:"#111",border:"1px solid #2C2C2C",borderRadius:11,padding:"11px 13px",marginBottom:11 }}>
                <div style={{ fontSize:12,fontWeight:700,color:"#FFFFFF",marginBottom:3 }}>🧾 Expert-comptable</div>
                <div style={{ fontSize:10,color:"#FFFFFF",marginBottom:9 }}>Tarif par logement/lot par an (~250€). Appuyez + ou − pour ajuster.</div>
                <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:7 }}>
                  <div>
                    <label style={{ display:"block",fontSize:11,fontWeight:600,color:"#FFFFFF",marginBottom:3 }}>Nombre de lots</label>
                    <div style={{ display:"flex",alignItems:"center",gap:6 }}>
                      <button onClick={()=>setNbLots(n=>Math.max(1,n-1))} style={{ width:30,height:30,borderRadius:7,border:"1px solid #2C2C2C",background:"#111",fontSize:16,cursor:"pointer",fontFamily:"inherit" }}>−</button>
                      <div style={{ flex:1,textAlign:"center",fontSize:18,fontWeight:800,color:"#E8C050" }}>{nbLots}</div>
                      <button onClick={()=>setNbLots(n=>n+1)} style={{ width:30,height:30,borderRadius:7,border:"1px solid #2C2C2C",background:"#111",fontSize:16,cursor:"pointer",fontFamily:"inherit" }}>+</button>
                    </div>
                  </div>
                  <F label="Prix/lot/an" value={prixCpt} onChange={setPrixCpt} suffix="€" step={50} sublabel="~200–350€/logement" />
                </div>
                <div style={{ marginTop:9,background:"#0F0D00",borderRadius:7,padding:"7px 10px",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                  <span style={{ fontSize:11,color:"#E8C050" }}>Total expert-comptable/an</span>
                  <span style={{ fontSize:14,fontWeight:800,color:"#E8C050" }}>{fmtE(cpt)}</span>
                </div>
              </div>
              <F label="Autres charges" value={autres} onChange={setAutres} suffix="€" />
              <div style={{ background:"#1A0A0A",borderRadius:9,padding:"7px 11px",fontSize:11,color:"#E8C050" }}>
                Total charges : <strong>{fmtE(charges)}</strong> ({fmtE(charges/12)}/mois)
              </div>
            </Sec>

            {/* VALORISATION */}
            <Sec title="Valorisation & plus-value" icon="📈" color="#E8C050">
              <div style={{ background:"#0F0D00",border:"1px solid #E8C05033",borderRadius:9,padding:"7px 11px",fontSize:10,color:"#E8C050",marginBottom:9 }}>
                🔗 Zone pré-remplie selon votre zone géo. Affinez ci-dessous si besoin.
              </div>
              <F label="Zone d'achat (précise)" value={region} onChange={handleRegion} options={Object.entries(ZONES).map(([k,v])=>({value:k,label:`${v.label} (~${v.taux}%/an)`}))} />
              <div style={{ background:zd.col,borderRadius:11,padding:"11px 13px",color:"#fff",marginBottom:11 }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2 }}>
                  <span style={{ fontWeight:700,fontSize:12 }}>{zd.label}</span>
                  <span style={{ background:"rgba(255,255,255,0.25)",borderRadius:99,padding:"1px 7px",fontSize:9,fontWeight:700 }}>{zd.tendance==="hausse"?"↗ Hausse":"→ Stable"}</span>
                </div>
                <div style={{ fontSize:10,opacity:0.9,marginBottom:5 }}>{zd.ctx}</div>
                <div style={{ fontSize:9,opacity:0.75 }}>Taux retenu ({typeBien}) : <strong>{(zd.taux*(COEFF[typeBien]||1)).toFixed(1)}%/an</strong> — Notaires de France, INSEE Q1 2025</div>
              </div>

              <div style={{ background:"#111",border:"1px solid #2C2C2C",borderRadius:9,padding:"9px 11px",marginBottom:11 }}>
                <div style={{ fontSize:11,fontWeight:700,color:"#FFFFFF",marginBottom:5 }}>Base de valorisation (bien rénové)</div>
                {[["Prix d'achat",fmtE(prixAchat)],["+ Travaux",fmtE(travaux)],...(budAmblTot>0?[["+ Ameublement",fmtE(budAmblTot)]]:
                []),["= Valeur rénovée",fmtE(valBase)]].map(([k,v])=>(
                  <div key={k} style={{ display:"flex",justifyContent:"space-between",fontSize:10,padding:"2px 0",borderBottom:"1px solid #1A1A1A" }}>
                    <span style={{ color:k.startsWith("=")?"#E8C050":"#888888",fontWeight:k.startsWith("=")?700:400 }}>{k}</span>
                    <span style={{ fontWeight:k.startsWith("=")?800:600,color:k.startsWith("=")?"#E8C050":"#BBBBBB" }}>{v}</span>
                  </div>
                ))}
              </div>

              <F label="Horizon de détention" value={horizon} onChange={setHorizon} suffix="ans" step={1} sublabel="Exonération IR après 22 ans, PS après 30 ans" />

              <div style={{ display:"flex",gap:7,overflowX:"auto",marginBottom:12 }}>
                {[0,Math.floor(horizon/3),Math.floor(2*horizon/3),horizon].filter((v,i,a)=>a.indexOf(v)===i).map(an=>{
                  const val=Math.round(valBase*Math.pow(1+tauxV,an)); const last=an===horizon;
                  return <div key={an} style={{ flex:"0 0 auto",background:last?zd.col:"#111111",border:`2px solid ${last?zd.col:"#2C2C2C"}`,borderRadius:11,padding:"9px 11px",textAlign:"center",minWidth:70 }}>
                    <div style={{ fontSize:9,color:last?"rgba(255,255,255,0.8)":"#555555",fontWeight:600 }}>An {an}</div>
                    <div style={{ fontSize:12,fontWeight:800,color:last?"#fff":"#F5F0E8",margin:"2px 0" }}>{Math.round(val/1000)}k€</div>
                    {an>0&&<div style={{ fontSize:9,color:last?"rgba(255,255,255,0.7)":"#888888" }}>+{Math.round((val-valBase)/1000)}k€</div>}
                  </div>;
                })}
              </div>

              {/* Tableau revente simplifié */}
              <div style={{ borderRadius:13,overflow:"hidden",border:"1px solid #2C2C2C" }}>
                <div style={{ background:"#0F0D00",padding:"11px 14px",color:"#fff" }}>
                  <div style={{ fontSize:12,fontWeight:800 }}>Si vous revendez dans {horizon} ans</div>
                  <div style={{ fontSize:9,opacity:0.7,marginTop:1 }}>Taux marché {(zd.taux*(COEFF[typeBien]||1)).toFixed(1)}%/an — bien rénové</div>
                </div>
                <div style={{ padding:"12px 14px" }}>
                  {[
                    ["Valeur du bien aujourd'hui (rénové)", fmtE(valBase), "#BBBBBB", "Prix d'achat + travaux + ameublement"],
                    ["Valeur estimée dans "+horizon+" ans",  fmtE(valFut),  "#40916C", `Après hausse du marché (${(zd.taux*(COEFF[typeBien]||1)).toFixed(1)}%/an)`],
                    ["Impôt sur la plus-value"+(horizon>=22?" ✅ Exonéré d'IR":""), "− "+fmtE(impotPV), impotPV>0?"#C0392B":"#40916C", horizon>=22?"Détention >22 ans → aucun IR":"19% IR + 17,2% PS (après abattements)"],
                  ].map(([k,v,c,sub])=>(
                    <div key={k} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #1A1A1A" }}>
                      <div>
                        <div style={{ fontSize:11,fontWeight:600,color:"#FFFFFF" }}>{k}</div>
                        <div style={{ fontSize:9,color:"#EEEEEE" }}>{sub}</div>
                      </div>
                      <span style={{ fontSize:13,fontWeight:800,color:c,flexShrink:0,marginLeft:8 }}>{v}</span>
                    </div>
                  ))}
                  <div style={{ marginTop:11,background:pvNette>=0?"#001A0A":"#1A0000",border:`2px solid ${pvNette>=0?"#16a34a":"#C0392B"}`,borderRadius:11,padding:"12px 14px" }}>

                  <Gauge value={rNette} max={12} label="Nette — après charges" color="#E8C96A" />

                {/* Cash-flow */}
                <div style={{ background:"#0A0A0A",border:`1px solid ${cfNet>=0?"#40916C44":"#C0392B44"}`,borderLeft:`3px solid ${cfNet>=0?"#40916C":"#C0392B"}`,borderRadius:8,padding:"12px 14px",marginBottom:12 }}>

                {/* Rendement capital */}
                <div style={{ background:"#0F0D00",border:"1px solid #E8C05022",borderRadius:8,padding:"10px 13px",marginBottom:10 }}>

                {/* TRI */}

                            : tri >= 3             ? "#A07830"   // Faible
                            : tri >= 0             ? "#C0392B"   // Très faible

                          const mention = tri===null ? "Non calculable"
                            : tri >= 8             ? "★ Excellent"
                            : tri >= 5             ? "✓ Correct"

                            : tri >= 0             ? "✗ Très faible"

                      </div>
                      <div style={{ marginTop:12,background:"#111",borderRadius:6,padding:"10px 12px" }}>
                        <div style={{ fontSize:9,color:"#EEEEEE",marginBottom:7,textTransform:"uppercase",letterSpacing:"1px" }}>Grille de lecture</div>
                        {[

                          ["#6aab7a","✓ 5–8%","Correct — objectif à viser"],
                          ["#E8C050",`~ ${(tauxCredit+assurCredit).toFixed(1)}–5%`,"Au-dessus du coût du crédit — levier positif"],
                          ["#A07830","▽ 3–"+( tauxCredit+assurCredit).toFixed(1)+"%","Faible — sous le coût du crédit"],
                          ["#C0392B","✗ 0–3%","Très faible — livret A fait mieux"],

                            <span style={{ color:c,fontSize:9,fontWeight:700,minWidth:60 }}>{lbl}</span>
                            <span style={{ color:"#FFFFFF",fontSize:9 }}>{desc}</span>

                      </div>
                    </>
                  )}
                </div>

                {/* ── COMPARAISON DES 4 RÉGIMES ── */}
                <div style={{ background:"#0A0A0A",border:"1px solid #2C2C2C",borderRadius:8,padding:"12px 14px",marginBottom:14 }}>
                  <div style={{ fontSize:9,textTransform:"uppercase",letterSpacing:"2px",color:"#E8C050",marginBottom:4 }}>◈ Comparaison automatique des régimes fiscaux</div>
                  <div style={{ fontSize:9,color:"#FFFFFF",marginBottom:12 }}>Même bien, mêmes données — quel régime est optimal pour vous ? <span style={{ color:"#E8C050",fontWeight:700 }}>◆ = meilleur</span></div>
                  <div style={{ overflowX:"auto" }}>
                    <table style={{ width:"100%",borderCollapse:"collapse",fontSize:10 }}>
                      <thead>
                        <tr style={{ borderBottom:"1px solid #2C2C2C" }}>

                          <td style={{ padding:"6px 8px",color:"#FFFFFF",fontSize:9,textAlign:"right" }}>CF/mois</td>
                          <td style={{ padding:"6px 8px",color:"#FFFFFF",fontSize:9,textAlign:"right" }}>Renta nette</td>
                          <td style={{ padding:"6px 8px",color:"#FFFFFF",fontSize:9,textAlign:"right" }}>Après impôts</td>

                        </tr>
                      </thead>
                      <tbody>
                        {comparRegimes.map(r => {
                          const isBest = r.regime === bestRegime.regime;
                          const isCurrent = r.regime === regime;
                          return (
                            <tr key={r.regime} style={{ borderBottom:"1px solid #1A1A1A", background:isBest?"#0F0D00":"transparent" }}>
                              <td style={{ padding:"8px 8px",fontSize:9,fontWeight:isBest?700:400 }}>

                              </td>
                              <td style={{ padding:"8px 8px",textAlign:"right",fontWeight:600,color:r.cfMensuel>=0?"#40916C":"#C0392B",fontSize:10 }}>

                              </td>
                              <td style={{ padding:"8px 8px",textAlign:"right",color:"#FFFFFF",fontSize:10 }}>{r.rNette.toFixed(2)}%</td>
                              <td style={{ padding:"8px 8px",textAlign:"right",color:isBest?"#E8C050":"#FFFFFF",fontWeight:isBest?700:400,fontSize:10 }}>{r.rNN.toFixed(2)}%</td>
                              <td style={{ padding:"8px 8px",textAlign:"right",color:"#C0392B",fontSize:10 }}>{Math.round(r.impotAnnuel).toLocaleString("fr-FR")} €</td>

                  </div>
                  <div style={{ marginTop:10,background:"#111",borderRadius:6,padding:"8px 10px",fontSize:9,color:"#FFFFFF" }}>
                    ◆ Régime optimal : <strong style={{ color:"#E8C050" }}>{bestRegime.label}</strong> — Cash-flow {bestRegime.cfMensuel>=0?"+":""}{Math.round(bestRegime.cfMensuel).toLocaleString("fr-FR")} €/mois · Renta nette-nette {bestRegime.rNN.toFixed(2)}%
                  </div>
                </div>

                {/* ── PROJECTION 20 ANS ── */}
                <div style={{ background:"#0A0A0A",border:"1px solid #2C2C2C",borderRadius:8,padding:"12px 14px",marginBottom:14 }}>
                  <div style={{ fontSize:9,textTransform:"uppercase",letterSpacing:"2px",color:"#E8C050",marginBottom:4 }}>◈ Projection sur 20 ans</div>
                  <div style={{ fontSize:9,color:"#FFFFFF",marginBottom:12 }}>
                    Loyers revalorisés à +{(IRL*100).toFixed(0)}%/an (IRL) · Charges indexées +{(INFLATION*100).toFixed(0)}%/an · Valorisation bien +{(tauxV*100).toFixed(1)}%/an
                  </div>
                  <div style={{ overflowX:"auto" }}>
                    <table style={{ width:"100%",borderCollapse:"collapse",fontSize:9,minWidth:380 }}>
                      <thead>

                          {["An","Loyer/mois","CF net/mois","Val. bien","Patrimoine net"].map(h=>(
                            <td key={h} style={{ padding:"5px 6px",color:"#E8C050",fontSize:8,textTransform:"uppercase",letterSpacing:"0.5px",textAlign:"right",whiteSpace:"nowrap" }}>{h}</td>

                            <td style={{ padding:"6px 6px",color:p.an===20?"#E8C050":"#FFFFFF",fontWeight:p.an===20?700:400 }}>An {p.an}</td>
                            <td style={{ padding:"6px 6px",textAlign:"right",color:"#FFFFFF" }}>{Math.round(p.loyer/12).toLocaleString("fr-FR")} €</td>
                            <td style={{ padding:"6px 6px",textAlign:"right",color:p.cfNet>=0?"#40916C":"#C0392B",fontWeight:600 }}>{p.cfNet>=0?"+":""}{Math.round(p.cfNet/12).toLocaleString("fr-FR")} €</td>
                            <td style={{ padding:"6px 6px",textAlign:"right",color:"#FFFFFF" }}>{Math.round(p.valBien/1000)}k€</td>
                            <td style={{ padding:"6px 6px",textAlign:"right",color:p.an===20?"#E8C050":"#FFFFFF",fontWeight:p.an===20?700:400 }}>{Math.round(p.patrimoine/1000)}k€</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <div style={{ marginTop:10,display:"flex",gap:8,flexWrap:"wrap" }}>
                    {[
                      ["Patrimoine an 10",Math.round(projection20[9]?.patrimoine||0),"#E8C050"],
                      ["Patrimoine an 20",Math.round(projection20[19]?.patrimoine||0),"#E8C050"],
                      ["Loyer estimé an 20",Math.round((projection20[19]?.loyer||0)/12),"#40916C"],
                    ].map(([lbl,val,c])=>(
                      <div key={lbl} style={{ flex:1,minWidth:100,background:"#111",borderRadius:7,padding:"8px 10px",textAlign:"center" }}>
                        <div style={{ fontSize:8,color:"#FFFFFF",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:3 }}>{lbl}</div>
                        <div style={{ fontSize:14,fontWeight:700,color:c }}>{Math.round(val).toLocaleString("fr-FR")} €</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ marginTop:8,fontSize:8,color:"#FFFFFF" }}>
                    ℹ Patrimoine net = valeur du bien − capital restant dû sur le crédit. Projection indicative basée sur les hypothèses actuelles.
                  </div>
                </div>

                {/* Récapitulatif */}
                <div style={{ fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:"2px",color:"#FFFFFF",marginBottom:8 }}>◈ Récapitulatif complet</div>
                {[
                  ["Prix d'achat",fmtE(prixAchat)],["Frais de notaire",fmtE(fraisNotE)],["Travaux",fmtE(travaux)],
                  ...(budAmblTot>0?[["Ameublement",fmtE(budAmblTot)]]:
                  []),
                  ["Investissement total",fmtE(invTotal)],["Apport",fmtE(apport)],
                  ["Crédit immobilier",fmtE(emprunImmo)],
                  ...(emprunTrax>0?[["Prêt travaux",fmtE(emprunTrax)]]:
                  []),
                  ...(emprunAmbl>0?[["Crédit conso",fmtE(emprunAmbl)]]:
                  []),
                  ["Mensualité totale",fmtE(mensTot)],["Loyer annuel net",fmtE(loyerNet)],
                  ["Charges annuelles",fmtE(charges)],["Impôt + PS/an",fmtE(impot+ps)],
                  ["Cash-flow annuel net",fmtE(cfNet)],
                  ["Rentabilité brute",fmtP(rBrute)],["Rentabilité nette",fmtP(rNette)],["Rentabilité nette-nette",fmtP(rNN)],
                ].map(([k,v],i)=>(
                  <div key={k} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #1A1A1A",fontSize:11 }}>
                    <span style={{ color:"#FFFFFF",letterSpacing:"0.3px" }}>{k}</span>
                    <span style={{ fontWeight:600,color:"#FFFFFF",fontVariantNumeric:"tabular-nums" }}>{v}</span>
                  </div>
                ))}

                  <div style={{ background:"#111", border:"1px solid #2C2C2C", borderRadius:8, padding:"10px 12px" }}>
                    <div style={{ fontSize:9, textTransform:"uppercase", letterSpacing:"1.5px", color:"#E8C050", marginBottom:6 }}>Nommer ce bien (pour la comparaison)</div>
                    <input
                      type="text"
                      value={nomBien}
                      onChange={e=>setNomBien(e.target.value)}
                      placeholder="Ex: Appart Lyon T2 centre, Maison Nantes..."
                      style={{ ...iS, fontSize:12 }}

                  <button onClick={()=>{

                      nom: nomBien || `Bien — ${new Date().toLocaleDateString("fr-FR")}`,
                      prixAchat, invTotal, loyer, cfNet, rBrute, rNette, rNN,

                    ◈ Sauvegarder ce bien pour comparer
                  </button>
                  {/* Bouton PDF */}
                  <button onClick={()=>{ if(onPDF) onPDF(); }} style={{ background:"transparent", border:"1px solid #2C2C2C", borderRadius:8, padding:"11px", color:"#FFFFFF", fontSize:11, fontWeight:500, cursor:"pointer", fontFamily:"inherit", letterSpacing:"0.5px" }}>
                    ⬇ Exporter en PDF / Imprimer
                  </button>
                </div>

                <div style={{ marginTop:12, padding:"9px 12px", background:"#0F0D00", border:"1px solid #E8C05011", borderRadius:7, fontSize:9, color:"#FFFFFF", letterSpacing:"0.3px" }}>
                  Simulation indicative — ne constitue pas un conseil fiscal ou financier. Consultez un expert-comptable avant tout investissement.
                </div>
              </div>
            </div>

          </div>
        </div>
      );
    }

    // ─── PAGE COMPARAISON ─────────────────────────────────────────────────────
    function PageComparaison({ biens, onSupprimer }) {
      const fmt  = n => Math.round(n).toLocaleString("fr-FR");
      const fmtE = n => `${Math.round(n).toLocaleString("fr-FR")} €`;
      const fmtP = n => `${n.toFixed(2)}%`;

      if(!biens || biens.length === 0) return (
        <div style={{ padding:"40px 20px", textAlign:"center" }}>
          <div style={{ fontSize:40, marginBottom:16 }}>🏘️</div>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:20, color:"#E8C050", marginBottom:8 }}>Aucun bien sauvegardé</div>
          <div style={{ fontSize:12, color:"#FFFFFF" }}>Simulez un bien et cliquez sur "Sauvegarder ce bien" pour l'ajouter à la comparaison.</div>
        </div>
      );

      const criteres = [
        { key:"nom",       label:"Bien",                    fmt: v=>v,        highlight:false },
        { key:"prixAchat", label:"Prix d'achat",            fmt: fmtE,        highlight:false },
        { key:"invTotal",  label:"Investissement total",    fmt: fmtE,        highlight:false },
        { key:"loyer",     label:"Loyer mensuel",           fmt: v=>fmtE(v),  highlight:false },
        { key:"cfNet",     label:"Cash-flow net/mois",      fmt: v=>`${v>=0?"+":""}${fmtE(v/12)}`, highlight:true, better:"max" },
        { key:"rBrute",    label:"Rentabilité brute",       fmt: fmtP,        highlight:true, better:"max" },
        { key:"rNette",    label:"Rentabilité nette",       fmt: fmtP,        highlight:true, better:"max" },
        { key:"rNN",       label:"Rentabilité nette-nette", fmt: fmtP,        highlight:true, better:"max" },
        { key:"tri10",     label:"TRI 10 ans",              fmt: v=>v!=null?fmtP(v):"N/A", highlight:true, better:"max" },
        { key:"tri20",     label:"TRI 20 ans",              fmt: v=>v!=null?fmtP(v):"N/A", highlight:true, better:"max" },
        { key:"regime",    label:"Régime fiscal",           fmt: v=>REGIME_INFO[v]?.label||v, highlight:false },
        { key:"travaux",   label:"Budget travaux",          fmt: fmtE,        highlight:false },
        { key:"mensTot",   label:"Mensualité totale",       fmt: fmtE,        highlight:true, better:"min" },
      ];

      return (
        <div style={{ padding:"12px 12px 40px", maxWidth:600, margin:"0 auto" }}>
          <div style={{ marginBottom:16 }}>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:20, color:"#E8C050", marginBottom:4 }}>Comparaison des biens</div>
            <div style={{ fontSize:10, color:"#FFFFFF", letterSpacing:"1px" }}>{biens.length} bien{biens.length>1?"s":""} sauvegardé{biens.length>1?"s":""} · Le meilleur est surligné en or</div>
          </div>

          {/* Tableau de comparaison */}
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
              <thead>
                <tr>
                  <td style={{ padding:"8px 10px", color:"#EEEEEE", fontSize:9, textTransform:"uppercase", letterSpacing:"1px", borderBottom:"1px solid #2C2C2C", minWidth:120 }}></td>
                  {biens.map((b,i) => (
                    <th key={i} style={{ padding:"8px 10px", color:"#E8C050", fontSize:10, fontWeight:600, textAlign:"center", borderBottom:"1px solid #E8C05033", minWidth:110, position:"relative" }}>
                      <div>{b.nom || `Bien ${i+1}`}</div>
                      <button onClick={()=>onSupprimer(i)} style={{ position:"absolute", top:2, right:2, background:"transparent", border:"none", color:"#EEEEEE", cursor:"pointer", fontSize:12 }}>✕</button>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {criteres.map((c,ci) => {
                  // Trouver le meilleur
                  const vals = biens.map(b => b[c.key]);
                  let bestIdx = -1;
                  if(c.highlight && c.better) {
                    const nums = vals.map(v => typeof v === "number" ? v : null);
                    const valids = nums.filter(v=>v!==null);
                    if(valids.length > 1) {
                      const best = c.better==="max" ? Math.max(...valids) : Math.min(...valids);
                      bestIdx = nums.indexOf(best);
                    }
                  }
                  return (
                    <tr key={ci} style={{ borderBottom:"1px solid #1A1A1A" }}>
                      <td style={{ padding:"8px 10px", color:"#FFFFFF", fontSize:10, letterSpacing:"0.5px" }}>{c.label}</td>
                      {biens.map((b,i) => {
                        const isBest = i === bestIdx;
                        const val = b[c.key];
                        const isNeg = typeof val === "number" && c.key==="cfNet" && val < 0;
                        return (
                          <td key={i} style={{ padding:"8px 10px", textAlign:"center", background:isBest?"#0F0D00":"transparent", color:isBest?"#E8C050":isNeg?"#C0392B":"#FFFFFF", fontWeight:isBest?700:400, fontSize:11, borderLeft:"1px solid #1A1A1A" }}>
                            {isBest && <span style={{ fontSize:8, marginRight:3 }}>◆</span>}
                            {c.fmt(val)}
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <div style={{ marginTop:16, padding:"10px 14px", background:"#0F0D00", border:"1px solid #E8C05022", borderRadius:8, fontSize:9, color:"#FFFFFF" }}>
            ◆ = meilleur résultat sur ce critère · Simulation indicative, ne constitue pas un conseil financier.
          </div>
        </div>
      );
    }

    // ─── APP PRINCIPALE ────────────────────────────────────────────────────────
    function AppPrincipale() {
      const [page, setPage] = useState("sim");
      const [biensSauv, setBiensSauv] = useState(() => {
        try { return JSON.parse(localStorage.getItem("immo_biens")||"[]"); } catch(e){ return []; }
      });
      const [derniereBien, setDerniereBien] = useState(null);
      const [notifSave, setNotifSave] = useState(false);

      const sauvegarderBien = (bien) => {
        if(biensSauv.length >= 5) { alert("Maximum 5 biens sauvegardés. Supprimez-en un dans l'onglet Comparaison."); return; }
        const nouveau = [...biensSauv, bien];
        setBiensSauv(nouveau);
        try { localStorage.setItem("immo_biens", JSON.stringify(nouveau)); } catch(e){}
        setNotifSave(true);
        setTimeout(()=>setNotifSave(false), 3000);
      };

      const supprimerBien = (idx) => {
        const nouveau = biensSauv.filter((_,i)=>i!==idx);
        setBiensSauv(nouveau);
        try { localStorage.setItem("immo_biens", JSON.stringify(nouveau)); } catch(e){}
      };

      const imprimerPDF = () => {
        window.print();
      };

      const TABS = [
        { id:"sim",  label:"Simulateur", icon:"◈" },
        { id:"comp", label:"Comparer",   icon:"⊞", badge: biensSauv.length > 0 ? biensSauv.length : null },
      ];

      return (
        <div style={{ background:"#0A0A0A", minHeight:"100vh" }}>

          {/* HEADER */}
          <div className="no-print" style={{ background:"#0A0A0A", padding:"18px 18px 0", borderBottom:"1px solid #1A1A1A" }}>
            <div style={{ maxWidth:600, margin:"0 auto" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", paddingBottom:12 }}>
                <div>
                  <div style={{ fontFamily:"'Cormorant Garamond','Georgia',serif", fontSize:22, fontWeight:600, color:"#FFFFFF", letterSpacing:"0.5px" }}>ImmoRentabilité</div>
                  <div style={{ fontSize:9, letterSpacing:"2.5px", textTransform:"uppercase", color:"#FFFFFF", marginTop:2 }}>Simulateur d'Investissement Locatif · France 2025</div>
                </div>
                <button onClick={imprimerPDF} style={{ background:"#0F0D00", border:"1px solid #E8C05044", borderRadius:7, padding:"6px 12px", color:"#E8C050", fontSize:10, fontWeight:600, cursor:"pointer", fontFamily:"inherit", letterSpacing:"0.5px" }}>
                  ⬇ PDF
                </button>
              </div>
              <div style={{ height:1, background:"linear-gradient(90deg,transparent,#E8C050,transparent)" }}></div>

              {/* TABS */}
              <div style={{ display:"flex", gap:0, marginTop:0 }}>
                {TABS.map(t => (
                  <button key={t.id} onClick={()=>setPage(t.id)}
                    style={{ flex:1, padding:"10px 8px", border:"none", background:"transparent", borderBottom:`2px solid ${page===t.id?"#E8C050":"transparent"}`, color:page===t.id?"#E8C050":"#555", fontSize:10, fontWeight:page===t.id?700:400, cursor:"pointer", fontFamily:"inherit", letterSpacing:"1px", textTransform:"uppercase", display:"flex", alignItems:"center", justifyContent:"center", gap:5, transition:"all 0.2s" }}>
                    <span>{t.icon}</span>
                    <span>{t.label}</span>
                    {t.badge && <span style={{ background:"#E8C050", color:"#0A0A0A", borderRadius:99, padding:"0 5px", fontSize:9, fontWeight:800 }}>{t.badge}</span>}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* NOTIF SAUVEGARDE */}
          {notifSave && (
            <div className="no-print" style={{ position:"fixed", bottom:20, left:"50%", transform:"translateX(-50%)", background:"#0F0D00", border:"1px solid #E8C050", borderRadius:10, padding:"10px 20px", color:"#E8C050", fontSize:12, fontWeight:600, zIndex:999, boxShadow:"0 4px 20px rgba(0,0,0,0.5)" }}>
              ✓ Bien sauvegardé — visible dans l'onglet Comparer
            </div>
          )}

          {/* CONTENU */}
          {page==="sim"  && <PageSimulateur onSauvegarder={sauvegarderBien} onPDF={imprimerPDF} />}
          {page==="comp" && <PageComparaison biens={biensSauv} onSupprimer={supprimerBien} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AppPrincipale />);
  </script>
</body>
</html>
